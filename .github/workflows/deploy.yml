name: KMP ResidManager CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'core/**'
      - 'app/shared/**'
      - 'app/webApp/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to deploy (all, api, web)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - web

jobs:
  # Job 1: Path change detection for total independence of deployments
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'server/**'
              - 'core/**'
              - 'app/shared/**'
            web:
              - 'app/webApp/**'
              - 'app/shared/**'

  # Job 2: Deploy Ktor API to Google Cloud Run
  deploy-api:
    needs: detect-changes
    # Triggers if pushed to server/core/shared, if manually triggered for 'api'/'all', or if commit message contains 'deploy-api'
    if: |
      needs.detect-changes.outputs.api == 'true' ||
      github.event.inputs.target == 'api' ||
      github.event.inputs.target == 'all' ||
      contains(github.event.head_commit.message, 'deploy-api')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Ktor Install Distribution
        run: ./gradlew :server:installDist --no-daemon

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Auth for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/residmanager-repo/residmanager-api:${{ github.sha }}"
          docker build -t $IMAGE_TAG -f server/Dockerfile server
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: residmanager-api
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/residmanager-repo/residmanager-api:${{ github.sha }}
          region: europe-west1
          env_vars: |
            JDBC_DATABASE_URL=${{ secrets.JDBC_DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_AUDIENCE=residmanager-api
            JWT_REALM=residmanager
            JWT_ISSUER=https://residmanager-api-1043005566320.europe-west1.run.app

  # Job 3: Deploy Web App (JS / Wasm) to Firebase Hosting
  deploy-web:
    needs: detect-changes
    # Triggers if pushed to webApp/shared, if manually triggered for 'web'/'all', or if commit message contains 'deploy-web'
    if: |
      needs.detect-changes.outputs.web == 'true' ||
      github.event.inputs.target == 'web' ||
      github.event.inputs.target == 'all' ||
      contains(github.event.head_commit.message, 'deploy-web')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Build Web Production Distribution
        run: ./gradlew :app:webApp:composeCompatibilityBrowserDistribution

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
